<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>The Professor's Victoria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        body {
            overflow: hidden;
            background: #0a0015;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        canvas {
            display: block;
            touch-action: none;
            width: 100% !important;
            height: 100% !important;
        }

        /* منوی اصلی - بهینه برای ایتا */
        #mainMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 0, 15, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: opacity 0.8s ease;
            padding: 20px;
        }
        #mainMenu.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .menu-container {
            text-align: center;
            padding: 30px 25px;
            background: rgba(20, 5, 35, 0.85);
            border-radius: 24px;
            border: 2px solid rgba(255, 100, 200, 0.25);
            box-shadow: 0 0 60px rgba(200, 50, 150, 0.1);
            max-width: 420px;
            width: 100%;
        }
        .menu-title {
            font-size: clamp(26px, 7vw, 38px);
            font-weight: 300;
            color: #ffb3d9;
            text-shadow: 0 0 30px rgba(255, 100, 200, 0.2);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .menu-title span {
            color: #ff7eb3;
            font-weight: 700;
        }
        .menu-subtitle {
            color: rgba(255, 200, 220, 0.4);
            font-size: clamp(10px, 2.5vw, 13px);
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 100, 200, 0.08);
            padding-bottom: 12px;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 13px 16px;
            margin: 7px 0;
            background: rgba(255, 100, 200, 0.06);
            border: 1px solid rgba(255, 100, 200, 0.15);
            border-radius: 50px;
            color: #ffb3d9;
            font-size: clamp(13px, 3.5vw, 15px);
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1.5px;
            font-family: inherit;
            text-align: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-btn:active {
            transform: scale(0.96);
            background: rgba(255, 100, 200, 0.15);
        }
        .menu-btn.primary {
            background: rgba(255, 50, 150, 0.2);
            border-color: #ff6b9d;
            color: #ff6b9d;
            font-weight: 600;
        }
        .menu-btn.primary:active {
            background: rgba(255, 50, 150, 0.35);
        }
        .menu-btn.social {
            background: rgba(100, 200, 255, 0.04);
            border-color: rgba(100, 200, 255, 0.1);
            color: rgba(200, 230, 255, 0.6);
            font-size: clamp(11px, 2.8vw, 13px);
        }
        .menu-divider {
            color: rgba(255, 200, 220, 0.08);
            margin: 10px 0;
            font-size: 11px;
            letter-spacing: 5px;
        }
        .menu-version {
            margin-top: 10px;
            font-size: clamp(9px, 2vw, 10px);
            color: rgba(255, 200, 220, 0.15);
            letter-spacing: 1px;
        }

        /* پنجره تنظیمات */
        #settingsModal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
        }
        #settingsModal.show {
            display: flex;
        }
        .settings-container {
            background: rgba(20, 5, 35, 0.95);
            padding: 25px 20px;
            border-radius: 24px;
            border: 2px solid rgba(255, 100, 200, 0.15);
            max-width: 400px;
            width: 100%;
            text-align: left;
        }
        .settings-container h2 {
            color: #ffb3d9;
            font-weight: 300;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 2px;
            font-size: clamp(18px, 4.5vw, 24px);
        }
        .settings-group {
            margin: 12px 0;
        }
        .settings-group label {
            color: rgba(255, 200, 220, 0.5);
            font-size: clamp(11px, 2.8vw, 13px);
            letter-spacing: 1px;
            display: block;
            margin-bottom: 6px;
        }
        .settings-group input[type="range"] {
            width: 100%;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 100, 200, 0.15);
            border-radius: 2px;
            outline: none;
        }
        .settings-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff6b9d;
            cursor: pointer;
            border: 2px solid rgba(255, 100, 200, 0.2);
            box-shadow: 0 0 15px rgba(255, 50, 150, 0.15);
        }
        .settings-group input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff6b9d;
            cursor: pointer;
            border: 2px solid rgba(255, 100, 200, 0.2);
        }
        .settings-value {
            color: #ffb3d9;
            font-size: clamp(11px, 2.8vw, 13px);
            float: right;
            font-weight: 600;
        }
        .settings-close-btn {
            display: block;
            width: 100%;
            padding: 11px;
            margin-top: 16px;
            background: rgba(255, 100, 200, 0.08);
            border: 1px solid rgba(255, 100, 200, 0.15);
            border-radius: 50px;
            color: #ffb3d9;
            font-size: clamp(12px, 3vw, 14px);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 2px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .settings-close-btn:active {
            transform: scale(0.96);
        }

        /* HUD */
        #hud {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 220, 0.3);
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 12px;
            border-radius: 16px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.02);
            font-size: clamp(8px, 2vw, 10px);
            z-index: 100;
            pointer-events: none;
            letter-spacing: 0.5px;
            text-align: center;
            display: none;
            white-space: nowrap;
        }
        #hud.show {
            display: block;
        }
        #hud kbd {
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 6px;
            border-radius: 6px;
            margin: 0 1px;
            color: #ffb3d9;
            border: 1px solid rgba(255, 150, 200, 0.08);
            font-size: clamp(7px, 1.8vw, 9px);
        }
        #healthBar {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: min(160px, 40vw);
            height: 3px;
            background: rgba(255, 0, 50, 0.12);
            border-radius: 3px;
            z-index: 100;
            display: none;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 50, 0.06);
        }
        #healthBar.show {
            display: block;
        }
        #healthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0044, #ff4488);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        #scoreDisplay {
            position: absolute;
            top: 12px;
            right: 12px;
            color: rgba(255, 200, 220, 0.5);
            font-size: clamp(14px, 3.5vw, 17px);
            z-index: 100;
            display: none;
            background: rgba(0, 0, 0, 0.35);
            padding: 4px 12px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.02);
            letter-spacing: 0.5px;
        }
        #scoreDisplay.show {
            display: block;
        }
        #scoreDisplay span {
            color: #ff6b9d;
            font-weight: 600;
        }

        /* صفحه Game Over */
        #deathScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 0, 10, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
        }
        #deathScreen.show {
            display: flex;
        }
        #deathScreen .content {
            text-align: center;
            color: #ff6b9d;
            padding: 25px 20px;
            background: rgba(20, 5, 35, 0.85);
            border-radius: 24px;
            border: 2px solid rgba(255, 50, 100, 0.15);
            max-width: 400px;
            width: 100%;
        }
        #deathScreen .content h1 {
            font-size: clamp(28px, 8vw, 40px);
            font-weight: 300;
            text-shadow: 0 0 40px rgba(255, 50, 100, 0.2);
            margin-bottom: 6px;
        }
        #deathScreen .content .sub {
            color: rgba(255, 200, 220, 0.35);
            font-size: clamp(11px, 2.8vw, 13px);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        #deathScreen .content .stats {
            color: rgba(255, 200, 220, 0.4);
            font-size: clamp(13px, 3.5vw, 15px);
            margin: 10px 0;
            letter-spacing: 0.5px;
        }
        #deathScreen .content .stats span {
            color: #ff7eb3;
            font-weight: 600;
        }
        #deathScreen .content .menu-btn {
            display: inline-block;
            width: auto;
            padding: 10px 25px;
            margin: 4px;
            font-size: clamp(12px, 3vw, 13px);
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(5, 0, 10, 0.6) 100%);
        }
        .grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
            opacity: 0.02;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" stitchTiles="stitch"/></filter><rect width="200" height="200" filter="url(%23n)" opacity="0.4"/></svg>');
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60;
            display: none;
            pointer-events: none;
        }
        #crosshair.show {
            display: block;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 200, 220, 0.25);
        }
        #crosshair::before {
            width: 16px;
            height: 1px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair::after {
            width: 1px;
            height: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair .dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 100, 200, 0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* کنترل‌های موبایل - بهینه برای ایتا */
        #mobileControls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 80;
            display: none;
            pointer-events: none;
            touch-action: none;
        }
        #mobileControls.show {
            display: block;
        }

        #joystickArea {
            position: absolute;
            bottom: 30px;
            left: 25px;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 100, 200, 0.06);
            border: 1.5px solid rgba(255, 100, 200, 0.12);
            pointer-events: auto;
            touch-action: none;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #joystickKnob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 100, 200, 0.25), rgba(255, 100, 200, 0.08));
            border: 1.5px solid rgba(255, 100, 200, 0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: none;
            touch-action: none;
        }
        #joystickKnob::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 100, 200, 0.15);
            transform: translate(-50%, -50%);
        }

        #fireBtn {
            position: absolute;
            bottom: 40px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 50, 100, 0.25), rgba(255, 50, 100, 0.08));
            border: 2px solid rgba(255, 50, 100, 0.3);
            color: rgba(255, 200, 220, 0.4);
            font-size: 20px;
            pointer-events: auto;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            font-family: inherit;
            letter-spacing: 0.5px;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
        }
        #fireBtn:active {
            transform: scale(0.90);
            background: radial-gradient(circle, rgba(255, 50, 100, 0.4), rgba(255, 50, 100, 0.15));
        }

        #lookArea {
            position: absolute;
            top: 0;
            right: 0;
            width: 70%;
            height: 100%;
            pointer-events: auto;
            touch-action: none;
            background: transparent;
        }

        #mobileInfo {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 220, 0.15);
            font-size: clamp(8px, 2vw, 10px);
            z-index: 90;
            display: none;
            letter-spacing: 1.5px;
            text-align: center;
            pointer-events: none;
        }
        #mobileInfo.show {
            display: block;
        }

        /* تنظیمات ویژه ایتا */
        .ita-status-bar {
            height: env(safe-area-inset-top, 0px);
            background: transparent;
        }

        @media (pointer: coarse) {
            #hud kbd {
                display: none;
            }
            #hud::after {
                content: '🎮 جوی‌استیک · 🔫 شلیک';
                font-size: clamp(8px, 1.8vw, 10px);
            }
        }

        /* برای صفحه‌های بسیار کوچک */
        @media (max-width: 400px) {
            #joystickArea {
                width: 80px;
                height: 80px;
                bottom: 20px;
                left: 15px;
            }
            #joystickKnob {
                width: 32px;
                height: 32px;
            }
            #joystickKnob::after {
                width: 12px;
                height: 12px;
            }
            #fireBtn {
                width: 48px;
                height: 48px;
                bottom: 28px;
                right: 15px;
                font-size: 16px;
            }
            .menu-container {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- منوی اصلی -->
    <div id="mainMenu">
        <div class="menu-container">
            <div class="menu-title">🧪 <span>The Professor's</span> Victoria</div>
            <div class="menu-subtitle">▸ آزمایش ویکتوریایی</div>

            <button class="menu-btn primary" id="startBtn">▶ START</button>
            <button class="menu-btn" id="settingsBtn">⚙ SETTINGS</button>
            <div class="menu-divider">— — —</div>
            <button class="menu-btn social" id="socialBtn">📱 aparat.com/drtaha</button>
            <div class="menu-version">گرافیک بالا · تجربه ترسناک</div>
        </div>
    </div>

    <!-- پنجره تنظیمات -->
    <div id="settingsModal">
        <div class="settings-container">
            <h2>⚙ تنظیمات</h2>
            <div class="settings-group">
                <label>FOV (میدان دید) <span class="settings-value" id="fovValue">70</span></label>
                <input type="range" id="fovSlider" min="50" max="100" value="70" step="1">
            </div>
            <div class="settings-group">
                <label>حساسیت <span class="settings-value" id="sensitivityValue">1.0</span></label>
                <input type="range" id="sensitivitySlider" min="0.1" max="2.0" value="1.0" step="0.1">
            </div>
            <button class="settings-close-btn" id="settingsCloseBtn">✓ اعمال و بستن</button>
        </div>
    </div>

    <!-- صفحه Game Over -->
    <div id="deathScreen">
        <div class="content">
            <h1>☠️ YOU DIED</h1>
            <div class="sub">پرفسور ویکتوریا شما را پیدا کرد...</div>
            <div class="stats">💀 زامبی‌های کشته شده: <span id="deathKills">0</span></div>
            <div style="display:flex; flex-direction:column; gap:6px; margin-top:16px;">
                <button class="menu-btn primary" id="respawnBtn">↻ تلاش مجدد</button>
                <button class="menu-btn secondary" id="menuBtn">🏠 منوی اصلی</button>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> حرکت · <kbd>🖱</kbd> چرخش · <kbd>🖱 چپ</kbd> شلیک
    </div>
    <div id="healthBar"><div id="healthFill"></div></div>
    <div id="scoreDisplay">💀 <span id="killCount">0</span></div>

    <div id="crosshair"><div class="dot"></div></div>

    <!-- کنترل‌های موبایل -->
    <div id="mobileControls">
        <div id="lookArea"></div>
        <div id="joystickArea">
            <div id="joystickKnob"></div>
        </div>
        <div id="fireBtn">🔫</div>
        <div id="mobileInfo">👆 سمت راست برای چرخش</div>
    </div>

    <div class="vignette"></div>
    <div class="grain"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- تشخیص دستگاه (بهینه برای ایتا) ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
            ('ontouchstart' in window) ||
            (navigator.maxTouchPoints > 0) ||
            (window.innerWidth < 1024);

        // تشخیص ایتا
        const isEita = navigator.userAgent.includes('Eita') || window.location.href.includes('eita');

        console.log('📱 دستگاه:', isMobile ? 'موبایل' : 'کامپیوتر');
        console.log('📱 ایتا:', isEita);

        // --- عناصر DOM ---
        const mainMenu = document.getElementById('mainMenu');
        const startBtn = document.getElementById('startBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const socialBtn = document.getElementById('socialBtn');
        const settingsModal = document.getElementById('settingsModal');
        const settingsCloseBtn = document.getElementById('settingsCloseBtn');
        const fovSlider = document.getElementById('fovSlider');
        const fovValue = document.getElementById('fovValue');
        const sensitivitySlider = document.getElementById('sensitivitySlider');
        const sensitivityValue = document.getElementById('sensitivityValue');
        const deathScreen = document.getElementById('deathScreen');
        const respawnBtn = document.getElementById('respawnBtn');
        const menuBtn = document.getElementById('menuBtn');
        const healthFill = document.getElementById('healthFill');
        const killCountEl = document.getElementById('killCount');
        const deathKillsEl = document.getElementById('deathKills');
        const crosshair = document.getElementById('crosshair');
        const hud = document.getElementById('hud');
        const healthBar = document.getElementById('healthBar');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const mobileControls = document.getElementById('mobileControls');
        const joystickArea = document.getElementById('joystickArea');
        const joystickKnob = document.getElementById('joystickKnob');
        const fireBtn = document.getElementById('fireBtn');
        const lookArea = document.getElementById('lookArea');
        const mobileInfo = document.getElementById('mobileInfo');

        // --- نمایش کنترل‌های مناسب ---
        if (isMobile) {
            mobileControls.classList.add('show');
            mobileInfo.classList.add('show');
            document.querySelector('#hud kbd')?.remove();
        }

        // --- متغیرهای بازی ---
        let gameRunning = false;
        let health = 100;
        let kills = 0;
        let enemies = [];
        let bullets = [];
        let shootCooldown = 0;
        let mouseSensitivity = 1.0;
        const ENEMY_SPEED = 0.04;
        const BULLET_SPEED = 0.5;
        const ATTACK_RANGE = 2.5;

        // --- متغیرهای جوی‌استیک ---
        let joystickActive = false;
        let joystickX = 0;
        let joystickY = 0;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isTouchingLook = false;

        // --- Three.js راه‌اندازی ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0015);
        scene.fog = new THREE.FogExp2(0x0a0015, 0.025);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);

        function spawnEnemies() {
            const positions = [];

                do {
                    x = (Math.random() - 0.5) * 24;
                    z = (Math.random() - 0.5) * 24;
                    valid = Math.abs(x) > 2 || Math.abs(z) > 2;
                    valid = valid && Math.abs(x) < 13 && Math.abs(z) < 13;

            positions.forEach(pos => createEnemy(pos));

        // --- کنترل‌ها ---

                if (!isLocked || !gameRunning) return;
                const mx = e.movementX || 0;
                const my = e.movementY || 0;
                euler.setFromQuaternion(camera.quaternion);
                euler.y -= mx * 0.002 * mouseSensitivity;
                euler.x -= my * 0.002 * mouseSensitivity;
                euler.x = Math.max(-PI_2 + 0.1, Math.min(PI_2 - 0.1, euler.x));
                camera.quaternion.setFromEuler(euler);
            });

                    keys[key] = true;
                    e.preventDefault();
                }
            });
            document.addEventListener('keyup', (e) => {

            joystickActive = true;
            updateJoystick(touch);
        }, { passive: false });

        joystickArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId) {
                    updateJoystick(touch);
                }
            }
        }, { passive: false });

        joystickArea.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId) {
                    joystickActive = false;
                    joystickX = 0;
                    joystickY = 0;
                    joystickKnob.style.transform = 'translate(-50%, -50%)';
                    joystickTouchId = null;

        }, { passive: false });

        joystickArea.addEventListener('touchcancel', () => {

            joystickX = 0;
            joystickY = 0;
            joystickKnob.style.transform = 'translate(-50%, -50%)';
            joystickTouchId = null;
        });

        function updateJoystick(touch) {
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const maxDist = rect.width / 2 - 15;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > maxDist) {
                dx = dx / dist * maxDist;
                dy = dy / dist * maxDist;
            }

            joystickX = dx / maxDist;
            joystickY = dy / maxDist;

            joystickKnob.style.transform = `translate(${-50 + (dx / maxDist) * 50}%, ${-50 + (dy / maxDist) * 50}%)`;
        }

        // --- شروع بازی ---
        function startGame() {

            health = 100;

            healthBar.classList.add('show');
            scoreDisplay.classList.add('show');

            if (isMobile) {
                mobileControls.classList.add('show');
                mobileInfo.classList.add('show');
            }

            camera.position.set(0, 1.6, 3);
            camera.quaternion.identity();

                    renderer.domElement.requestPointerLock();

        // --- به‌روزرسانی بازی ---
        function updateGame() {
            if (!gameRunning) return;

            if (shootCooldown > 0) shootCooldown--;

            // حرکت WASD (کامپیوتر)
            if (!isMobile && window._keys) {
                const speed = 0.08;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0;
                forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0;
                right.normalize();

                const move = new THREE.Vector3(0, 0, 0);
                if (window._keys.w) move.add(forward);
                if (window._keys.s) move.add(forward.clone().multiplyScalar(-1));
                if (window._keys.a) move.add(right.clone().multiplyScalar(-1));
                if (window._keys.d) move.add(right);
                if (move.length() > 0) {
                    move.normalize().multiplyScalar(speed);
                    camera.position.add(move);
                    camera.position.x = Math.max(-13, Math.min(13, camera.position.x));
                    camera.position.z = Math.max(-13, Math.min(13, camera.position.z));
                }
            }

            // حرکت جوی‌استیک (موبایل)
            if (isMobile && joystickActive) {
                const speed = 0.08;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0;
                forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0;
                right.normalize();

                const move = new THREE.Vector3(0, 0, 0);
                if (Math.abs(joystickY) > 0.1) {
                    move.add(forward.clone().multiplyScalar(-joystickY));
                }
                if (Math.abs(joystickX) > 0.1) {
                    move.add(right.clone().multiplyScalar(joystickX));
                }
                if (move.length() > 0) {
                    move.normalize().multiplyScalar(speed * Math.min(1, move.length()));
                    camera.position.add(move);
                    camera.position.x = Math.max(-13, Math.min(13, camera.position.x));
                    camera.position.z = Math.max(-13, Math.min(13, camera.position.z));
                }
            }

            // به‌روزرسانی گلوله‌ها
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.userData.velocity);
                b.userData.life--;
                if (b.userData.life <= 0 ||
                    Math.abs(b.position.x) > 15 ||
                    Math.abs(b.position.z) > 15) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                    continue;
                }
                let hit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dist = b.position.distanceTo(enemy.position);
                    if (dist < 1.0) {
                        enemy.userData.health -= 15;
                        if (enemy.userData.health <= 0) {
                            scene.remove(enemy);
                            enemies.splice(j, 1);
                            kills++;
                            killCountEl.textContent = kills;
                            if (Math.random() < 0.15) {
                                const pos = {
                                    x: (Math.random() - 0.5) * 20,
                                    z: (Math.random() - 0.5) * 20
                                };
                                createEnemy(pos);
                            }
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            // حرکت زامبی‌ها
            for (const enemy of enemies) {
                const dir = new THREE.Vector3()
                    .copy(camera.position)
                    .sub(enemy.position);
                dir.y = 0;
                const dist = dir.length();
                if (dist > 0.5 && dist < 20) {
                    dir.normalize().multiplyScalar(enemy.userData.speed);
                    enemy.position.add(dir);
                }

                if (dist < ATTACK_RANGE) {
                    enemy.userData.attackCooldown--;
                    if (enemy.userData.attackCooldown <= 0) {
                        health -= isMobile ? 3 : 5;
                        healthFill.style.width = Math.max(0, health) + '%';
                        enemy.userData.attackCooldown = 30;
                        const flash = document.createElement('div');
                        flash.style.cssText =
                            'position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center, rgba(255,0,0,0.12), transparent 70%);pointer-events:none;z-index:30;';
                        document.body.appendChild(flash);
                        setTimeout(() => flash.remove(), 100);

                        if (health <= 0) {
                            gameOver();
                            return;
                        }
                    }
                }
            }

            // اسپاون زامبی جدید
            const maxEnemies = isMobile ? 6 : 10;
            if (enemies.length < maxEnemies && Math.random() < 0.003) {
                const pos = {
                    x: (Math.random() - 0.5) * 22,
                    z: (Math.random() - 0.5) * 22
                };
                if (Math.abs(pos.x) > 2 || Math.abs(pos.z) > 2) {
                    createEnemy(pos);
                }
            }

            // حرکت پرفسور
            const profDir = new THREE.Vector3()
                .copy(camera.position)
                .sub(professorGroup.position);
            profDir.y = 0;
            const profDist = profDir.length();
            if (profDist > 3 && profDist < 20) {
                profDir.normalize().multiplyScalar(0.02);
                professorGroup.position.add(profDir);
            }
            professorGroup.lookAt(camera.position);
            professorGroup.rotation.x = 0;
            professorGroup.rotation.z = 0;

            if (profDist < 2.5) {
                gameOver();
                return;
            }

            professorGroup.children.forEach(child => {
                if (child.isMesh && child.material && child.material.emissiveIntensity === 2.0) {
                    child.material.emissiveIntensity = 1.5 + Math.sin(Date.now() * 0.005 + child.position.x) * 0.8;
                }
            });
        }

        function gameOver() {
            gameRunning = false;
            deathKillsEl.textContent = kills;
            deathScreen.classList.add('show');
            crosshair.classList.remove('show');
            hud.classList.remove('show');
            healthBar.classList.remove('show');
            scoreDisplay.classList.remove('show');
            if (isMobile) {
                mobileControls.classList.remove('show');
                mobileInfo.classList.remove('show');
            }
            if (document.pointerLockElement) {
                document.exitPointerLock();
            }
        }

        // --- حلقه انیمیشن ---
        function animate() {
            requestAnimationFrame(animate);
            updateGame();

            emergencyLight.intensity = 0.3 + Math.sin(Date.now() * 0.003) * 0.1;
            emergencyLight2.intensity = 0.2 + Math.cos(Date.now() * 0.004) * 0.1;

            renderer.render(scene, camera);
        }

        // --- مدیریت سایز ---
        function handleResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);

            if (isMobile) {
                const lookWidth = width * 0.7;
                lookArea.style.width = lookWidth + 'px';
            }
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => {
            setTimeout(handleResize, 300);
        });

        // --- شروع ---
        if (isMobile) {
            const lookWidth = window.innerWidth * 0.7;
            lookArea.style.width = lookWidth + 'px';
        }

        animate();
        console.log('🎮 The Professor\'s Victoria - آماده است!');
        console.log('📱 دستگاه:', isMobile ? 'موبایل' : 'کامپیوتر');
        console.log('📱 ایتا:', isEita);
        console.log('📺 aparat.com/drtaha');
    </script>
</body>
</html>
